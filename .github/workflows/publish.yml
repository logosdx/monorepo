name: Publish
on:
  push:
    branches:
      - "master"
      - "beta"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write  # Required for OIDC
  contents: write
  actions: write
  issues: write
  pull-requests: write


jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}
    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether to publish
        id: decide
        run: |
          # Manual runs always publish.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch -> publish"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Beta publishes only while changesets pre-release mode is active.
          if [ "${{ github.ref }}" = "refs/heads/beta" ]; then
            if [ -f ".changeset/pre.json" ]; then
              echo "Beta pre-release mode -> publish"
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
            else
              echo "Beta without pre-release mode -> skip"
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # master: publish only when a package's "version" field changed in
          # this push, i.e. the "Version Packages" PR just merged. A -G filter
          # on '"version":' ignores dependency-range edits and other churn.
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          ZERO="0000000000000000000000000000000000000000"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO" ]; then
            BEFORE="${AFTER}^"
          fi

          if git diff --quiet -G'"version":' "$BEFORE" "$AFTER" -- 'packages/*/package.json'; then
            echo "No package version change since $BEFORE -> skip"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Package version change detected:"
            git diff --name-only -G'"version":' "$BEFORE" "$AFTER" -- 'packages/*/package.json'
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:

      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      # Workaround: setup-node injects a fake NODE_AUTH_TOKEN placeholder
      # that prevents npm OIDC trusted publishing from activating.
      # See: https://github.com/actions/setup-node/issues/1440
      - name: Enable OIDC publishing
        run: npm config delete //registry.npmjs.org/:_authToken

      - run: pnpm install --frozen-lockfile

      - name: Publish
        uses: changesets/action@v1
        with:
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ""

  docs:
    if: github.ref == 'refs/heads/master'
    needs: publish
    uses: ./.github/workflows/docs.yml
    secrets:
      DOCS_SSH_KEY: ${{ secrets.DOCS_SSH_KEY }}
      SITE_SSH_KEY: ${{ secrets.SITE_SSH_KEY }}
